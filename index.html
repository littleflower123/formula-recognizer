<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Formula OCR</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
</head>

<body>

<h1>📷 Formula OCR（本地版）</h1>

<form id="uploadForm">
    <input type="file" id="imageInput" accept="image/*" required />
    <button type="submit" id="btn">上传识别</button>
</form>

<h2>LaTeX代码（可编辑）</h2>
<textarea id="latexInput" rows="4" style="width:100%;"></textarea>

<button onclick="copyLatex()">复制LaTeX</button>

<h2>公式预览</h2>
<div id="preview" style="font-size:24px;"></div>

<script>
const btn = document.getElementById("btn");

document.getElementById('uploadForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const file = document.getElementById('imageInput').files[0];
    if (!file) {
        alert("请先选择图片");
        return;
    }

    const formData = new FormData();
    formData.append('image', file);

    btn.disabled = true;
    btn.innerText = "识别中，请稍等...";

    console.log("开始发送请求");

    fetch('http://127.0.0.1:5000/upload', {
        method: 'POST',
        body: formData
    })
    .then(response => {
        console.log("收到响应");
        return response.json();
    })
    .then(data => {
        console.log("返回数据", data);

        if (data.latex) {
            document.getElementById('latexInput').value = data.latex;
            renderLatex(data.latex);
        } else {
            alert("识别失败：" + data.error);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("请求失败，请确认后端是否运行！");
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerText = "上传识别";
    });
});

function renderLatex(latex) {
    const preview = document.getElementById('preview');
    preview.innerHTML = "";

    try {
        katex.render(latex, preview);
    } catch (e) {
        preview.innerText = "公式错误：" + e.message;
    }
}

document.getElementById('latexInput').addEventListener('input', function() {
    renderLatex(this.value);
});

function copyLatex() {
    const input = document.getElementById('latexInput');
    input.select();
    document.execCommand("copy");
    alert("已复制！");
}
</script>

</body>
</html>

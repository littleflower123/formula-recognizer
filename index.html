<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula OCR</title>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
</head>

<body>
    <h1>📸 Formula OCR</h1>

    <form id="uploadForm">
        <input type="file" id="imageInput" accept="image/*" required />
        <button type="submit">上传识别</button>
    </form>

    <h2>🧾 LaTeX代码（可编辑）</h2>
    <textarea id="latexInput" rows="4"></textarea>

    <button onclick="copyLatex()">📋 复制LaTeX</button>

    <h2>📐 公式预览</h2>
    <div id="preview"></div>

    <script>
        const API_URL = "https://formula-recognizer.onrender.com/upload"; // 🔥关键修改

        document.getElementById('uploadForm').addEventListener('submit', function(event) {
            console.log("点击了上传");
            console.log("开始发送请求"); 
            event.preventDefault();


            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files.length) {
                alert("请先选择图片！");
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            fetch(API_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert("识别失败：" + data.error);
                    return;
                }

                console.log("LaTeX:", data.latex);

                const input = document.getElementById('latexInput');
                input.value = data.latex;

                renderLatex(data.latex);
            })
            .catch(error => {
                console.error('Error:', error);
                alert("请求失败，请检查后端是否运行！");
            });
        });

        function renderLatex(latex) {
            const preview = document.getElementById('preview');
            preview.innerHTML = "";

            try {
                katex.render(latex, preview);
            } catch (e) {
                preview.innerText = "❌ 公式错误：" + e.message;
            }
        }

        // 🔥 实时渲染
        document.getElementById('latexInput').addEventListener('input', function() {
            renderLatex(this.value);
        });

        // 🔥 更现代复制方式
        function copyLatex() {
            const text = document.getElementById('latexInput').value;

            navigator.clipboard.writeText(text)
                .then(() => alert("✅ 已复制！"))
                .catch(() => alert("❌ 复制失败"));
        }
    </script>

    <style>
        body {
            max-width: 800px;
            margin: auto;
            font-family: Arial;
            padding: 20px;
        }

        textarea {
            width: 100%;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
            margin-top: 10px;
        }

        #preview {
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 50px;
            background: #f9f9f9;
            margin-top: 10px;
            font-size: 24px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</body>
</html>
